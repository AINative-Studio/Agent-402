[pytest]
# Root-level pytest config — covers tests at the repo root AND delegates
# to backend/pytest.ini for backend/app/tests.
#
# AINative BDD collection convention (per .claude/skills/mandatory-tdd):
#   - class Describe*  — BDD test group (in addition to pytest's Test*)
#   - def it_*          — BDD test case (in addition to pytest's test_*)
#
# Built by AINative Dev Team
# Refs .claude/skills/mandatory-tdd/SKILL.md
testpaths = tests backend/app/tests
python_files = test_*.py
python_classes = Test* Describe*
python_functions = test_* it_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
asyncio_mode = auto
markers =
    integration: Integration tests
    unit: Unit tests
