[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ainative-agent"
version = "0.1.0"
description = "AINative Python SDK for agent, memory, vector, and file operations"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "AINative Dev Team" }
]
keywords = ["ainative", "agent", "memory", "vector", "ai", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "mypy>=1.10.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_classes = ["Describe*", "Test*"]
python_functions = ["it_*", "test_*"]

[tool.coverage.run]
source = ["ainative_agent"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.mypy]
strict = true
python_version = "3.10"
