[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ainative-agent-runtime"
version = "0.1.0"
description = "AINative embeddable agent runtime — local, offline-capable, multi-provider"
authors = [{ name = "AINative Dev Team" }]
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "aiohttp>=3.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "aioresponses>=0.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=ainative_agent_runtime --cov-report=term-missing --cov-fail-under=80"
python_files = ["test_*.py"]
python_classes = ["Describe*"]
python_functions = ["it_*"]

[tool.coverage.run]
source = ["ainative_agent_runtime"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
